<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perth Lawn Renovation — Logo / Profile Picture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  body{ margin:0; background:#141414; font-family:'Hanken Grotesk',sans-serif; }
  .stage{ width:1000px; height:1000px; }
  svg{ display:block; }
</style>
</head>
<body>

<!-- ══ OPTION A — Emblem badge ══ -->
<div class="stage"><svg id="A" viewBox="0 0 1000 1000" width="1000" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgA" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#123018"/><stop offset="100%" stop-color="#0a1a0e"/>
    </radialGradient>
    <path id="topA" d="M 175 500 A 325 325 0 0 1 825 500" fill="none"/>
    <path id="botA" d="M 815 500 A 315 315 0 0 1 185 500" fill="none"/>
  </defs>
  <circle cx="500" cy="500" r="500" fill="url(#bgA)"/>
  <circle cx="500" cy="500" r="472" fill="none" stroke="#A3E635" stroke-width="11"/>
  <circle cx="500" cy="500" r="448" fill="none" stroke="rgba(163,230,53,.30)" stroke-width="3"/>
  <text fill="#F6F2E7" font-family="Anton, sans-serif" font-size="74" letter-spacing="3">
    <textPath href="#topA" startOffset="50%" text-anchor="middle">PERTH LAWN RENOVATION</textPath>
  </text>
  <text fill="#A3E635" font-family="Anton, sans-serif" font-size="52" letter-spacing="7">
    <textPath href="#botA" startOffset="50%" text-anchor="middle">EST. 15+ YEARS · WA</textPath>
  </text>
  <circle cx="185" cy="500" r="8" fill="#A3E635"/>
  <circle cx="815" cy="500" r="8" fill="#A3E635"/>
  <g transform="translate(500 505) scale(2.7) translate(-100 -100)">
    <path d="M100 140 C100 140 60 120 60 85 C60 65 75 55 90 65 C95 68 98 75 100 85 C102 75 105 68 110 65 C125 55 140 65 140 85 C140 120 100 140 100 140 Z" fill="#A3E635"/>
    <rect x="96" y="130" width="8" height="30" rx="3" fill="#A3E635"/>
  </g>
</svg></div>

<!-- ══ OPTION B — Clean icon mark ══ -->
<div class="stage"><svg id="B" viewBox="0 0 1000 1000" width="1000" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgB" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#14351c"/><stop offset="100%" stop-color="#0a1a0e"/>
    </radialGradient>
  </defs>
  <circle cx="500" cy="500" r="500" fill="url(#bgB)"/>
  <circle cx="500" cy="500" r="452" fill="none" stroke="#A3E635" stroke-width="14"/>
  <g transform="translate(500 455) scale(4.2) translate(-100 -100)">
    <path d="M100 140 C100 140 60 120 60 85 C60 65 75 55 90 65 C95 68 98 75 100 85 C102 75 105 68 110 65 C125 55 140 65 140 85 C140 120 100 140 100 140 Z" fill="#A3E635"/>
    <rect x="96" y="130" width="8" height="30" rx="3" fill="#A3E635"/>
  </g>
  <text x="500" y="815" fill="#F6F2E7" font-family="Anton, sans-serif" font-size="90" letter-spacing="12" text-anchor="middle">PLR</text>
</svg></div>

<!-- ══ OPTION C — Stacked wordmark ══ -->
<div class="stage"><svg id="C" viewBox="0 0 1000 1000" width="1000" height="1000" xmlns="http://www.w3.org/2000/svg">
  <circle cx="500" cy="500" r="500" fill="#0a1a0e"/>
  <circle cx="500" cy="500" r="470" fill="none" stroke="rgba(163,230,53,.4)" stroke-width="6"/>
  <g transform="translate(500 340) scale(2.5) translate(-100 -100)">
    <path d="M100 140 C100 140 60 120 60 85 C60 65 75 55 90 65 C95 68 98 75 100 85 C102 75 105 68 110 65 C125 55 140 65 140 85 C140 120 100 140 100 140 Z" fill="#A3E635"/>
    <rect x="96" y="130" width="8" height="30" rx="3" fill="#A3E635"/>
  </g>
  <text x="500" y="580" fill="#F6F2E7" font-family="Anton, sans-serif" font-size="118" letter-spacing="2" text-anchor="middle">PERTH</text>
  <text x="500" y="694" fill="#F6F2E7" font-family="Anton, sans-serif" font-size="118" letter-spacing="2" text-anchor="middle">LAWN</text>
  <text x="500" y="786" fill="#A3E635" font-family="Hanken Grotesk, sans-serif" font-weight="800" font-size="40" letter-spacing="13" text-anchor="middle">RENOVATION</text>
</svg></div>

</body>
</html>
